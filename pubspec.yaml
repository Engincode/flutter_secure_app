name: flutter_secure_app
description: "A robust security wrapper for Flutter applications implementing Runtime Application Self-Protection (RASP), SSL Pinning, and Anti-Proxy mechanisms."
version: 0.0.1
homepage:

environment:
  sdk: ^3.5.0
  flutter: '>=3.3.0'

dependencies:
  device_info_plus: '>=11.0.0 <14.0.0'
  dio: ^5.0.0
  flutter:
    sdk: flutter
  flutter_secure_storage: '>=9.0.0 <=11.0.0'
  http_certificate_pinning: ^3.0.1
  package_info_plus: '>=8.0.0 <11.0.0'
  plugin_platform_interface: ^2.0.2
  shared_preferences: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.engincode.flutter_secure_app
        pluginClass: FlutterSecureAppPlugin
      ios:
        pluginClass: FlutterSecureAppPlugin
